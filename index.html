<!DOCTYPE html>
<html>
<head>
<title>Happy Women's Day</title>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background: linear-gradient(135deg, #fff0f5, #ffb6c1);
font-family: 'Arial', sans-serif;
flex-direction:column;
overflow: hidden;
position: relative;
}

body::before {
content: '';
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="%23ff69b4" opacity="0.1"/></svg>') repeat;
animation: float 20s infinite linear;
}

@keyframes float {
0% { transform: translateY(0px); }
100% { transform: translateY(-100px); }
}

h1{
font-size:60px;
color: #ff1493;
animation: fadeInUp 2s ease-out;
text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

@keyframes fadeInUp {
0% {
opacity: 0;
transform: translateY(30px);
}
100% {
opacity: 1;
transform: translateY(0);
}
}

p{
font-size: 24px;
color: #8b008b;
animation: fadeIn 3s ease-out 1s both;
}

button{
padding:15px 30px;
font-size:20px;
margin-top:30px;
background: linear-gradient(45deg, #ff69b4, #ffb6c1);
color: white;
border: none;
border-radius: 25px;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 15px rgba(255,105,180,0.3);
animation: bounceIn 2s ease-out 2s both;
}

button:hover {
transform: scale(1.1);
box-shadow: 0 6px 20px rgba(255,105,180,0.4);
}

@keyframes bounceIn {
0% {
opacity: 0;
transform: scale(0.3);
}
50% {
opacity: 1;
transform: scale(1.05);
}
70% {
transform: scale(0.9);
}
100% {
opacity: 1;
transform: scale(1);
}
}

@keyframes fadeIn {
0% { opacity: 0; }
100% { opacity: 1; }
}
</style>
</head>

<body>

<h1>Happy Women's Day 🌸</h1>
<p>To the most amazing friend in my life</p>

<a href="page2.html">
<button>Next</button>
</a>

</body>
</html>
